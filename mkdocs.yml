# ===================== 基础站点配置 =====================
site_name: 我的帮助中心
site_url: https://shenlianginc.github.io/open-docs-for-shenliang
site_description: 产品使用指南 & 常见问题解答
site_author: 你的团队名称
copyright: Copyright © 2026 你的团队名称

# ===================== 主题配置 =====================
theme:
  name: material
  language: zh
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Noto Sans SC
    code: JetBrains Mono

# ===================== 导航结构（仅保留存在的文件） =====================
nav:
  - 首页: index.md

# ===================== 插件配置（极简无报错版） =====================
plugins:
  - search:  # 禁用内置搜索（关键！）
      enabled: false
  - localsearch:  # 启用专门的中文搜索插件
      lang: zh
      jieba: true  # 开启 jieba 分词
      index_every_page: true  # 索引所有页面
  - mkdocs-video: {}
  - mermaid2:
      version: 10.6.1
      javascript: https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js
  - git-revision-date-localized:
      type: date
      format: yyyy-MM-dd
      fallback_to_build_date: true
  - mike:
      alias_type: symlink
      deploy_prefix: versions


# ===================== Markdown扩展（修复slugify错误） =====================
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      # 修复slugify核心错误：使用兼容写法
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# ===================== 自定义JS/CSS（非空配置） =====================
extra_javascript:
  - assets/empty.js  # 占位，避免空配置报错

extra_css:
  - assets/custom.css

# ===================== 在线编辑配置 =====================
repo_url: https://github.com/shenlianginc/open-docs-for-shenliang
repo_name: 编辑文档
edit_uri: edit/main/docs/