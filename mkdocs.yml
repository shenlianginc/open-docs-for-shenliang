site_name: 产品帮助中心
site_url: https://shenlianginc.github.io/open-docs-for-shenliang
site_description: 一站式产品使用指南
site_author: 技术团队

theme:
  name: material
  language: zh
  # 注释掉自定义目录（避免本地缺少文件报错，如需启用请确保 docs/styles/ 存在）
  # custom_dir: docs/styles/
  # 注释掉自定义CSS（避免本地缺少文件报错）
  # extra_css:
  #   - styles/custom.css
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest       # 搜索建议（中文必备）
    - search.highlight     # 搜索结果高亮
    - search.share         # 搜索结果分享
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - toc.follow

# 中文搜索核心配置（你的历史有效版本）
plugins:
  - search:
      lang: 
        - zh
        - en
      # 关键：适配中文分词的分隔符（包含零宽空格）
      separator: '[\s\u200b\-]'
      # 启用模糊搜索，支持中间关键词匹配
      fuzzy: true
      # 支持2字及以上中文搜索
      min_search_length: 2
      # 预构建索引，强制jieba分词生效
      prebuild_index: true
  # 保留其他必要插件，移除冗余配置
  - mkdocs-video: {}
  - mermaid2:
      version: 10.6.1
      javascript: https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js
  - git-revision-date-localized:
      type: date
      format: yyyy-MM-dd
      fallback_to_build_date: true
  - mike:
      alias_type: symlink
      deploy_prefix: versions

nav:
  - 首页: index.md
  - 产品A:
      - 产品介绍: 产品A/intro.md
      - 快速开始: 产品A/quickstart.md
  - 产品B:
      - 安装部署: 产品B/install.md
      - API文档: 产品B/api.md
      - 功能教程: 产品B/tutorial.md
  - 关于我们: about.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
      # 修复slugify报错的兼容写法
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# 非空配置占位（避免报错）
extra_javascript:
  - assets/empty.js

# 仓库编辑链接配置
repo_url: https://github.com/shenlianginc/open-docs-for-shenliang
repo_name: 编辑文档
edit_uri: edit/main/docs/